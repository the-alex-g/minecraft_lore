<h2>Obtaining</h2>
<p>Resonant rods can be obtained from killing <a href="resonant_sprite.html">resonant sprites</a> or mining <a href="sculk_vibrum.html">sculk vibrums.</a></p>
<h2>Usage</h2>
<p>Resonant rods can be used to craft <a href="resonant_arrow.html">resonant arrows</a> and <a href="resonant_bow.html">resonant bows.</a></p>

<h2>Obtaining</h2>
<p>Obscure froglights drop as an item when broken with any tool or by hand. The tool used does not change the breaking time.</p>
<p>Obscure froglights can only be obtained when tiny <a href="sculk_lymph_bottle">sculk slimes</a> are eaten by frogs.</p>
<h2>Usage</h2>
<p>Obscure froglights glow with strength 15.</p>

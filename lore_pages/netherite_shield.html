      <h2>Obtaining</h2>
<p>Netherite shields can be crafted from six planks and a netherite ingot.</p>
<h2>Usage</h2>
<p>Netherite shields function exactly as a regular shield, except they have a durability of 1500, almost 5x that of a regular shield, and are immune to fire like other netherite items.</p>

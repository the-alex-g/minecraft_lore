      <h1 class="center">Blight Grenade</h1>
      <h2>Obtaining</h2>
<p>Blight grenades can only be obtained from using glass bottles on a <a href="blight_reservoir.html">blight reservoir.</a></p>
<h2>Usage</h2>
<p>Blight grenades can be thrown, exploding with a power of 1.5 when it hits something. Dispensers fire blight grenades in the same way as arrows.</p>
